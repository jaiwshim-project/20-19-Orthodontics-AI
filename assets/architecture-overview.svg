      <g transform="translate(1140,50)"><rect width="160" height="60" rx="10" fill="rgba(239,68,68,0.14)" stroke="#EF4444"/><text x="80" y="26" text-anchor="middle" font-weight="600">Rule-base</text><text x="80" y="44" text-anchor="middle" font-size="10" fill="#9CA3AF">Tweed · Steiner · Down</text></g>
      <g transform="translate(1320,50)"><rect width="120" height="60" rx="10" fill="rgba(229,231,235,0.06)" stroke="#9CA3AF"/><text x="60" y="26" text-anchor="middle" font-weight="600">+ Custom</text><text x="60" y="44" text-anchor="middle" font-size="10" fill="#9CA3AF">Fine-tune</text></g>
