  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#E5E7EB">Orthodontics AI · Palantir-grade Multi-Agent Architecture</text>
  <text x="800" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#9CA3AF">4-Layer Stack · 20 AI Agents · AXOS 8-Node Ontology</text>

