      <g transform="translate(200,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">3d-viewer</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">Three.js + STL</text></g>
      <g transform="translate(380,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">extraction-ai</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">발치 판단</text></g>
      <g transform="translate(560,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">growth-prediction</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">성장 예측</text></g>
      <g transform="translate(740,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">facial-simulation</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">안모 시뮬</text></g>
      <g transform="translate(920,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">recurrence</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">재발 예측</text></g>
      <g transform="translate(1100,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">chatbot</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">RAG · Gemini</text></g>
      <g transform="translate(1280,50)"><rect width="160" height="55" rx="10" fill="rgba(14,165,233,0.14)" stroke="#0EA5E9"/><text x="80" y="24" text-anchor="middle" font-weight="600">dashboard</text><text x="80" y="42" text-anchor="middle" font-size="10" fill="#9CA3AF">분석</text></g>
