      <g transform="translate(700,50)"><rect width="220" height="60" rx="10" fill="rgba(139,92,246,0.14)" stroke="#8B5CF6"/><text x="110" y="26" text-anchor="middle" font-weight="600">Neo4j Aura</text><text x="110" y="44" text-anchor="middle" font-size="10" fill="#9CA3AF">8 노드 · 7 관계 · similar-case</text></g>
      <g transform="translate(940,50)"><rect width="200" height="60" rx="10" fill="rgba(229,231,235,0.06)" stroke="#9CA3AF"/><text x="100" y="26" text-anchor="middle" font-weight="600">RLS · Audit</text><text x="100" y="44" text-anchor="middle" font-size="10" fill="#9CA3AF">멀티테넌시 · HIPAA</text></g>
      <g transform="translate(1160,50)"><rect width="280" height="60" rx="10" fill="rgba(229,231,235,0.06)" stroke="#9CA3AF" stroke-dasharray="4 3"/><text x="140" y="26" text-anchor="middle" font-weight="600">+ DICOM Gateway · HL7 FHIR (SaaS)</text><text x="140" y="44" text-anchor="middle" font-size="10" fill="#9CA3AF">의료 표준 연동</text></g>
