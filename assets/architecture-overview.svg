      <g transform="translate(360, 16)"><rect width="170" height="36" rx="6" fill="rgba(16,185,129,0.12)" stroke="#10B981"/><text x="85" y="23" text-anchor="middle">③ AI · 추론</text></g>
      <g transform="translate(540, 16)"><rect width="170" height="36" rx="6" fill="rgba(245,158,11,0.12)" stroke="#F59E0B"/><text x="85" y="23" text-anchor="middle">④ DB · 데이터</text></g>
      <g transform="translate(720, 16)"><rect width="170" height="36" rx="6" fill="rgba(239,68,68,0.12)" stroke="#EF4444"/><text x="85" y="23" text-anchor="middle">⑤ Output · 출력</text></g>
      <g transform="translate(900, 16)"><rect width="170" height="36" rx="6" fill="rgba(14,165,233,0.12)" stroke="#0EA5E9"/><text x="85" y="23" text-anchor="middle">⑥ User · 사용자</text></g>
      <g transform="translate(1080, 16)"><rect width="170" height="36" rx="6" fill="rgba(139,92,246,0.12)" stroke="#8B5CF6"/><text x="85" y="23" text-anchor="middle">⑦ External · 외부</text></g>
