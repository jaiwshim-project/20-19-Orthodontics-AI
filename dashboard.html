<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="환자 분포·진단 트렌드·재발 알림을 한눈에 보는 종합 대시보드.">
<meta property="og:title" content="환자 대시보드 · Orthodontics AI">
<title>대시보드 · Orthodontics AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/global.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .kpi-card { padding: 18px; }
  .kpi-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .kpi-card .num { font-size: 32px; font-weight: 800; margin-top: 6px; line-height: 1; }
  .kpi-card .delta { font-size: 12px; margin-top: 6px; }
  .kpi-card .delta.up { color: var(--color-success); }
  .kpi-card .delta.down { color: var(--color-danger); }
  .chart-wrap { position: relative; height: 260px; }
  .search-row { display:flex; gap:8px; margin-bottom:12px; }
</style>
</head>
<body>
<div id="app-shell"></div>
<main class="content">
<div class="container">

<div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:24px;">
  <div>
    <span class="badge badge-primary">Analytics</span>
    <h2 style="margin-top:8px;">환자 대시보드 <span style="font-size:14px; color:var(--text-muted);">Patient Dashboard</span></h2>
    <p>병원 전체 환자/진단 현황을 한눈에 파악합니다.</p>
  </div>
  <div class="actions">
    <button class="btn btn-ghost" onclick="refreshAll()">↻ 새로고침</button>
    <button class="btn btn-primary" onclick="exportCSV()">📥 CSV 내보내기</button>
  </div>
</div>

<div class="grid grid-4">
  <div class="card kpi-card">
    <div class="lbl">총 환자</div>
    <div class="num" id="kpiTotal">—</div>
    <div class="delta up" id="kpiTotalDelta">—</div>
  </div>
  <div class="card kpi-card">
    <div class="lbl">진단 완료</div>
    <div class="num" id="kpiDone" style="color:var(--color-success);">—</div>
    <div class="delta up" id="kpiDoneDelta">—</div>
  </div>
  <div class="card kpi-card">
    <div class="lbl">진행 중</div>
    <div class="num" id="kpiOngoing" style="color:var(--color-primary);">—</div>
    <div class="delta" id="kpiOngoingDelta">—</div>
  </div>
  <div class="card kpi-card">
    <div class="lbl">재발 알림</div>
    <div class="num" id="kpiAlert" style="color:var(--color-danger);">—</div>
    <div class="delta down" id="kpiAlertDelta">—</div>
  </div>
</div>

<div class="grid grid-3 mt-4" style="grid-template-columns: 1fr 1fr 1.4fr;">
  <div class="card">
    <h3 style="margin-bottom:12px;">연령 분포</h3>
    <div class="chart-wrap"><canvas id="ageChart"></canvas></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:12px;">진단 유형</h3>
    <div class="chart-wrap"><canvas id="typeChart"></canvas></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:12px;">월별 트렌드</h3>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>
</div>

<div class="card mt-4">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <h3>환자 목록</h3>
    <div class="search-row">
      <input class="input" id="searchInput" placeholder="이름/ID 검색" style="width:240px;">
      <select class="select" id="filterAge" style="width:140px;">
        <option value="">전체 연령</option>
        <option value="child">어린이</option>
        <option value="adult">성인</option>
      </select>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>이름</th><th>연령</th><th>성별</th><th>최근 진단</th><th>건수</th><th>상태</th><th>재발 위험</th><th>업데이트</th>
        </tr>
      </thead>
      <tbody id="patientTbody"></tbody>
    </table>
  </div>
</div>

</div>
</main>

<script src="js/api-config.js"></script>
<script src="js/common.js"></script>
<script src="js/charts.js"></script>
<script src="js/diagnosis-store.js"></script>
<script>
const TYPE_KO = { extraction: '발치', growth: '성장', facial: '안모', recurrence: '재발' };
const STATUS_KO = {
  pending_review: { label: '검토 대기', cls: 'badge-warning' },
  reviewed:       { label: '검토 완료', cls: 'badge-primary' },
  accepted:       { label: '수용',     cls: 'badge-success' },
  rejected:       { label: '거부',     cls: 'badge-danger' },
  archived:       { label: '보관',     cls: 'badge-primary' }
};

let DATA = []; // 저장된 진단 레코드 통합 목록
let DATA_SOURCE = 'local';

async function loadData() {
  const result = await window.DiagnosisStore.list({ limit: 200 });
  DATA = result.records || [];
  DATA_SOURCE = result.source;
  return DATA;
}

// 환자 단위로 그룹핑된 뷰 (마지막 진단 + 재발 risk)
function groupByPatient(records) {
  const map = new Map();
  records.forEach(r => {
    const p = r.patient || {};
    const key = (p.id || p.name || '익명') + '|' + (p.dob || '');
    if (!map.has(key)) {
      map.set(key, {
        id: p.id || key,
        name: p.name || '(익명)',
        ageGroup: p.ageGroup || 'adult',
        age: r.patient?.age || (p.dob ? Math.floor((Date.now() - new Date(p.dob)) / 31557600000) : null),
        gender: p.gender || '',
        diagnoses: []
      });
    }
    map.get(key).diagnoses.push(r);
  });
  return Array.from(map.values()).map(p => {
    p.diagnoses.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
    p.lastType = p.diagnoses[0]?.type;
    p.status = p.diagnoses[0]?.result?.status || 'pending_review';
    p.recurrence = p.diagnoses.find(d => d.type === 'recurrence')?.result?.probabilities?.y10 ?? null;
    p.updated = (p.diagnoses[0]?.created_at || '').slice(0, 10);
    return p;
  });
}

let charts = {};
let GROUPED = [];

async function refreshAll() {
  await loadData();
  GROUPED = groupByPatient(DATA);

  const total = GROUPED.length;
  const totalDiag = DATA.length;
  const accepted = DATA.filter(d => d.result?.status === 'accepted').length;
  const pending = DATA.filter(d => (d.result?.status || 'pending_review') === 'pending_review').length;
  const alert = GROUPED.filter(p => (p.recurrence ?? 0) > 50).length;

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiDone').textContent = accepted;
  document.getElementById('kpiOngoing').textContent = pending;
  document.getElementById('kpiAlert').textContent = alert;
  document.getElementById('kpiTotalDelta').textContent = `진단 누적 ${totalDiag}건 · ${DATA_SOURCE === 'supabase' ? '클라우드' : DATA_SOURCE === 'mixed' ? '클라우드+로컬' : '로컬'}`;
  document.getElementById('kpiDoneDelta').textContent = `수용된 진단`;
  document.getElementById('kpiOngoingDelta').textContent = `검토 대기`;
  document.getElementById('kpiAlertDelta').textContent = `재발 위험 50%↑`;

  const child = GROUPED.filter(p => p.ageGroup === 'child').length;
  if (charts.age) charts.age.destroy();
  charts.age = window.Charts.donut('ageChart', {
    labels: ['어린이', '성인'],
    values: [child, Math.max(1, total) - child],
    colors: ['#F59E0B', '#0EA5E9']
  });

  const typeCount = ['extraction','growth','facial','recurrence'].map(t => DATA.filter(d => d.type === t).length);
  if (charts.type) charts.type.destroy();
  charts.type = window.Charts.bar('typeChart', {
    labels: ['발치', '성장', '안모', '재발'],
    values: typeCount,
    label: '진단 수'
  });

  const months = [];
  const counts = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const ym = d.toISOString().slice(0, 7);
    months.push(ym.slice(5) + '월');
    counts.push(DATA.filter(rec => (rec.created_at || '').startsWith(ym)).length);
  }
  if (charts.trend) charts.trend.destroy();
  charts.trend = window.Charts.line('trendChart', {
    labels: months,
    datasets: [{ label: '신규 진단', values: counts }]
  });

  renderTable();
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const fAge = document.getElementById('filterAge').value;
  const filtered = GROUPED.filter(p => {
    if (q && !(p.name || '').toLowerCase().includes(q) && !(p.id || '').toLowerCase().includes(q)) return false;
    if (fAge && p.ageGroup !== fAge) return false;
    return true;
  });
  const tbody = document.getElementById('patientTbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:var(--text-muted); padding:40px;">
      저장된 진단이 없습니다. <a href="extraction-ai.html">발치 판단</a> 등에서 환자 등록 후 분석·저장해 보세요.
    </td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.slice(0, 60).map(p => {
    const recurr = p.recurrence;
    const riskCls = recurr == null ? 'badge-primary' : recurr > 50 ? 'badge-danger' : recurr > 30 ? 'badge-warning' : 'badge-success';
    const recLbl = recurr == null ? '—' : `${Math.round(recurr)}%`;
    const stat = STATUS_KO[p.status] || STATUS_KO.pending_review;
    const lastDiagId = p.diagnoses[0]?.id || '';
    return `
      <tr style="cursor:pointer;" onclick="location.href='patient-detail.html?id=${encodeURIComponent(lastDiagId)}'">
        <td><code style="color:var(--text-muted); font-size:11px;">${(p.id || '').slice(-8)}</code></td>
        <td><strong>${escapeHtml(p.name)}</strong></td>
        <td>${p.age != null ? p.age + '세' : '—'} <span class="badge ${p.ageGroup === 'child' ? 'badge-warning' : 'badge-primary'}" style="margin-left:4px;">${p.ageGroup === 'child' ? '어린이' : '성인'}</span></td>
        <td>${p.gender === 'male' ? '남' : p.gender === 'female' ? '여' : '—'}</td>
        <td>${TYPE_KO[p.lastType] || p.lastType}</td>
        <td>${p.diagnoses.length}건</td>
        <td><span class="badge ${stat.cls}">${stat.label}</span></td>
        <td><span class="badge ${riskCls}">${recLbl}</span></td>
        <td style="color:var(--text-muted);">${p.updated}</td>
      </tr>`;
  }).join('');
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function exportCSV() {
  const rows = [['id','name','age','ageGroup','gender','type','status','recurrence','created_at']];
  DATA.forEach(d => rows.push([
    d.id || '',
    d.patient?.name || '',
    d.patient?.age || '',
    d.patient?.ageGroup || '',
    d.patient?.gender || '',
    d.type,
    d.result?.status || 'pending_review',
    d.result?.probabilities?.y10 ?? '',
    d.created_at || ''
  ]));
  const csv = '﻿' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `diagnoses-${Date.now()}.csv`;
  a.click();
  window.toast('CSV 내보내기 완료', 'success');
}

document.getElementById('searchInput').oninput = renderTable;
document.getElementById('filterAge').onchange = renderTable;
refreshAll();
</script>
</body>
</html>
