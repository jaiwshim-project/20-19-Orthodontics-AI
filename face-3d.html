<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="3D 얼굴 변화 시뮬레이션 — Three.js 기반 parametric 얼굴 메쉬 + 5 슬라이더 morph.">
<meta property="og:title" content="3D 얼굴 시뮬 · Orthodontics AI">
<title>3D 얼굴 시뮬 · Orthodontics AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/global.css">
<style>
  .f3d-shell { display:grid; grid-template-columns: 1fr 320px; height: calc(100vh - var(--header-height)); }
  @media (max-width: 1024px) { .f3d-shell { grid-template-columns: 1fr; height: auto; } }
  .f3d-canvas-wrap { position: relative; background: radial-gradient(circle at center, #1a2438 0%, #0a0f1c 100%); overflow: hidden; }
  #face-canvas { width: 100%; height: 100%; display: block; }
  @media (max-width: 1024px) { #face-canvas { height: 60vh; } }
  .f3d-toolbar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: rgba(11,18,32,0.85); backdrop-filter: blur(12px); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 6px; z-index: 10; }
  .f3d-toolbar button { background: transparent; border: none; color: var(--text-secondary); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .f3d-toolbar button.active { background: rgba(14,165,233,0.18); color: var(--color-primary); }
  .f3d-toolbar button:hover { background: rgba(255,255,255,0.06); }
  .f3d-panel { background: rgba(255,255,255,0.02); border-left: 1px solid var(--border-subtle); padding: 16px; overflow-y: auto; }
  @media (max-width: 1024px) { .f3d-panel { border-left: none; border-top: 1px solid var(--border-subtle); } }
  .slider-row { display: grid; grid-template-columns: 90px 1fr 50px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-subtle); }
  .slider-row label { font-size: 12px; margin: 0; }
  .slider-row input[type=range] { accent-color: var(--color-primary); }
  .slider-row .v { font-family: monospace; font-size: 12px; color: var(--color-primary); text-align: right; font-weight: 700; }

  .info-card { padding: 12px; background: rgba(14,165,233,0.06); border: 1px solid rgba(14,165,233,0.2); border-radius: 10px; margin-top: 14px; font-size: 12px; line-height: 1.6; }
</style>
</head>
<body>
<div id="app-shell"></div>
<main class="content">
  <div class="f3d-shell">

    <div class="f3d-canvas-wrap">
      <div class="f3d-toolbar">
        <button data-view="front" class="active">정면</button>
        <button data-view="side">측면</button>
        <button data-view="iso">3D</button>
        <button data-view="top">상단</button>
        <button id="toggleBefore">Before</button>
        <button id="resetBtn">초기화</button>
        <button id="snapBtn">📷</button>
      </div>
      <canvas id="face-canvas"></canvas>
    </div>

    <aside class="f3d-panel">
      <h3 style="margin-bottom: 12px;">🧊 3D 얼굴 시뮬레이션</h3>
      <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5;">
        parametric 얼굴 메쉬에 5 슬라이더로 골격·연조직 변화를 실시간 morph합니다.
      </p>

      <div class="slider-row"><label>상악 후방</label><input type="range" id="sMaxRetract" min="-2" max="6" step="0.1" value="0"><span class="v" id="vMaxRetract">0.0</span></div>
      <div class="slider-row"><label>하악 전후</label><input type="range" id="sMandShift" min="-5" max="5" step="0.1" value="0"><span class="v" id="vMandShift">0.0</span></div>
      <div class="slider-row"><label>상순</label><input type="range" id="sLipUpper" min="-3" max="3" step="0.1" value="0"><span class="v" id="vLipUpper">0.0</span></div>
      <div class="slider-row"><label>하순</label><input type="range" id="sLipLower" min="-3" max="3" step="0.1" value="0"><span class="v" id="vLipLower">0.0</span></div>
      <div class="slider-row"><label>턱</label><input type="range" id="sChin" min="-3" max="3" step="0.1" value="0"><span class="v" id="vChin">0.0</span></div>

      <div style="margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap;">
        <button class="btn btn-ghost btn-sm" id="loadPatient" style="font-size:11px;">📋 환자 데이터 적용</button>
        <button class="btn btn-primary btn-sm" id="goToFacial" onclick="window.location.href='facial-simulation.html'" style="font-size:11px;">2D 안모 시뮬 →</button>
      </div>

      <div class="info-card">
        💡 마우스 드래그로 회전, 휠로 줌. Before 토글로 변화량 비교 가능. 슬라이더 즉시 morph.
      </div>

      <div class="info-card" style="background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.2);">
        ⚠️ 본 시뮬레이션은 parametric 메쉬 기반 추정이며, 실제 환자 안모는 CBCT 기반 3D 모델에서 확인하세요 (V2 로드맵).
      </div>
    </aside>

  </div>
</main>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script src="js/api-config.js"></script>
<script src="js/common.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls, faceMesh, beforeMesh, showBefore = false;

// Parametric 얼굴 메쉬 빌더 (간소화 — 타원형 모델)
function buildFaceMesh(params = {}) {
  const {
    maxRetract = 0,
    mandShift = 0,
    lipUpper = 0,
    lipLower = 0,
    chin = 0
  } = params;
  // SphereGeometry → 변형
  const geo = new THREE.SphereGeometry(8, 64, 64);
  // Y 축으로 늘리기 (얼굴 길이)
  geo.scale(0.85, 1.1, 0.95);
  // Vertex 변형
  const positions = geo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = positions.getZ(i);

    let dx = 0, dy = 0, dz = 0;

    // y >= 0 위쪽 (이마/상악) — A point 영역 (y: 1~3, z front 양수)
    if (z > 5 && y > 1 && y < 4) {
      dz -= maxRetract * 0.3; // 상악 후방
      dy += -lipUpper * 0.05;  // 상순 위치
    }
    // 입술 부위 (y: -1~1)
    if (z > 4 && y > -1 && y < 1) {
      dz -= maxRetract * 0.18 + (-lipUpper * 0.4);  // 상순 = 상악×60% + 슬라이더
    }
    if (z > 4 && y > -3 && y < -1) {
      dz += mandShift * 0.21 + (-lipLower * 0.4);  // 하순
    }
    // 하악 (y: -5~-2)
    if (z > 3 && y < -2) {
      dz += mandShift * 0.3;
    }
    // 턱 끝 (y < -5)
    if (y < -5) {
      dz += mandShift * 0.3 + chin * 0.4;
    }

    positions.setXYZ(i, x + dx, y + dy, z + dz);
  }
  positions.needsUpdate = true;
  geo.computeVertexNormals();

  const material = new THREE.MeshStandardMaterial({
    color: 0xfbcfa8,
    roughness: 0.55,
    metalness: 0.05,
    flatShading: false
  });
  return new THREE.Mesh(geo, material);
}

function init() {
  const canvas = document.getElementById('face-canvas');
  const wrap = canvas.parentElement;

  scene = new THREE.Scene();
  scene.background = null;
  scene.fog = new THREE.Fog(0x0a0f1c, 30, 100);

  camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 1000);
  camera.position.set(0, 0, 35);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight, false);

  // Lighting (rim + key + fill)
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  const key = new THREE.DirectionalLight(0xffffff, 0.85);
  key.position.set(20, 30, 25);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x8B5CF6, 0.5);
  rim.position.set(-20, 10, -25);
  scene.add(rim);
  const fill = new THREE.DirectionalLight(0x0EA5E9, 0.3);
  fill.position.set(20, -10, 0);
  scene.add(fill);

  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.minDistance = 15;
  controls.maxDistance = 80;
  controls.target.set(0, 0, 0);

  // 초기 메쉬
  faceMesh = buildFaceMesh();
  scene.add(faceMesh);

  // Before 메쉬 (기본은 invisible)
  beforeMesh = buildFaceMesh();
  beforeMesh.material = beforeMesh.material.clone();
  beforeMesh.material.transparent = true;
  beforeMesh.material.opacity = 0.3;
  beforeMesh.material.color = new THREE.Color(0xff6b6b);
  beforeMesh.visible = false;
  scene.add(beforeMesh);

  window.addEventListener('resize', onResize);
  animate();
}

function onResize() {
  const wrap = renderer.domElement.parentElement;
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight, false);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function getParams() {
  return {
    maxRetract: parseFloat(document.getElementById('sMaxRetract').value),
    mandShift: parseFloat(document.getElementById('sMandShift').value),
    lipUpper: parseFloat(document.getElementById('sLipUpper').value),
    lipLower: parseFloat(document.getElementById('sLipLower').value),
    chin: parseFloat(document.getElementById('sChin').value)
  };
}

function rebuildMesh() {
  if (faceMesh) {
    scene.remove(faceMesh);
    faceMesh.geometry.dispose();
  }
  faceMesh = buildFaceMesh(getParams());
  scene.add(faceMesh);
  // Update slider value displays
  document.getElementById('vMaxRetract').textContent = getParams().maxRetract.toFixed(1);
  document.getElementById('vMandShift').textContent  = getParams().mandShift.toFixed(1);
  document.getElementById('vLipUpper').textContent   = getParams().lipUpper.toFixed(1);
  document.getElementById('vLipLower').textContent   = getParams().lipLower.toFixed(1);
  document.getElementById('vChin').textContent       = getParams().chin.toFixed(1);
}

// Slider events
document.querySelectorAll('input[type=range]').forEach(s => s.addEventListener('input', rebuildMesh));

// View buttons
document.querySelectorAll('[data-view]').forEach(b => b.onclick = () => {
  document.querySelectorAll('[data-view]').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const v = b.dataset.view;
  const positions = {
    front: [0, 0, 35],
    side:  [35, 0, 0],
    top:   [0, 35, 0.01],
    iso:   [25, 18, 25]
  };
  const p = positions[v];
  camera.position.set(p[0], p[1], p[2]);
  controls.target.set(0, 0, 0);
  controls.update();
});

// Before toggle
document.getElementById('toggleBefore').onclick = (e) => {
  showBefore = !showBefore;
  beforeMesh.visible = showBefore;
  e.target.classList.toggle('active', showBefore);
};

// Reset
document.getElementById('resetBtn').onclick = () => {
  document.querySelectorAll('input[type=range]').forEach(s => s.value = 0);
  rebuildMesh();
};

// Snapshot
document.getElementById('snapBtn').onclick = () => {
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = `face-3d-${Date.now()}.png`;
  a.click();
  window.toast('스크린샷 저장 완료', 'success');
};

// 환자 데이터 적용 (선택)
document.getElementById('loadPatient').onclick = async () => {
  const params = new URLSearchParams(location.search);
  const pid = params.get('id') || window.PatientStore.get()?.supabaseId;
  if (!pid) { window.toast('환자 ID가 없습니다.', 'warning'); return; }
  try {
    const res = await window.apiFetch(`/api/get-diagnoses?patient_id=${pid}&type=facial`);
    const data = await res.json();
    const facial = data.records?.[0]?.inputs;
    if (!facial) { window.toast('이 환자의 안모 진단 데이터 없음', 'warning'); return; }
    document.getElementById('sMaxRetract').value = facial.maxRetract || 0;
    document.getElementById('sMandShift').value  = facial.mandShift || 0;
    document.getElementById('sLipUpper').value   = facial.lipUpper || 0;
    document.getElementById('sLipLower').value   = facial.lipLower || 0;
    document.getElementById('sChin').value       = facial.chin || 0;
    rebuildMesh();
    window.toast('환자 안모 데이터를 적용했습니다.', 'success');
  } catch (e) {
    window.toast('데이터 로드 실패: ' + e.message, 'error');
  }
};

init();
</script>
</body>
</html>
