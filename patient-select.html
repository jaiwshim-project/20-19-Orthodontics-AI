<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="환자 선택 — 저장된 환자에서 선택하거나 신규 환자를 등록합니다.">
<meta property="og:title" content="환자 선택 · Orthodontics AI">
<title>환자 선택 · Orthodontics AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/global.css">
<style>
  .ps-hero {
    text-align: center;
    padding: 32px 24px 16px;
  }
  .ps-hero h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    margin-bottom: 8px;
  }
  .ps-hero p {
    color: var(--text-muted);
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
  }
  .ps-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    padding: 6px;
    background: #F1F5F9;
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  .ps-tabs button {
    flex: 1;
    padding: 14px 18px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 10px;
    font-weight: 500;
    font-size: 14px;
    font-family: inherit;
    transition: all .2s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .ps-tabs button:hover { color: var(--text-primary); background: rgba(14,165,233,0.08); }
  .ps-tabs button.active {
    background: var(--gradient-primary);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(14,165,233,0.3);
  }
  .ps-tabs button .icon { font-size: 18px; }
  .ps-tabs button .count {
    margin-left: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    font-size: 11px;
    font-weight: 700;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }

  /* ===== 저장된 환자 탭 ===== */
  .search-bar {
    display: flex; gap: 8px;
    margin-bottom: 18px;
  }
  .search-bar .input {
    flex: 1;
    font-size: 15px;
    padding: 14px 18px;
  }
  .search-bar .filter-btn {
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-md);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .search-bar .filter-btn.active {
    background: rgba(14,165,233,0.18);
    border-color: var(--color-primary);
    color: var(--color-primary);
  }

  .patient-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    overflow: hidden;
  }
  .pcard.pcard-header {
    background: #f1f5f9;
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    cursor: default;
  }
  .pcard.pcard-header:hover { background: #f1f5f9; }
  .pcard {
    display: flex; align-items: center; gap: 0;
    padding: 9px 12px;
    cursor: pointer;
    transition: background .1s;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 12px;
  }
  .pcard:last-child { border-bottom: none; }
  .pcard:hover { background: rgba(14,165,233,0.04); }
  .pcard .col-name { min-width: 130px; font-weight: 700; font-size: 13px; }
  .pcard .col-class { width: 65px; text-align: center; }
  .pcard .col-gender { width: 40px; text-align: center; }
  .pcard .col-age { width: 40px; text-align: center; }
  .pcard .col-start { width: 85px; text-align: center; color: var(--text-secondary); }
  .pcard .col-end { width: 85px; text-align: center; color: var(--text-secondary); }
  .pcard .col-extract { width: 65px; text-align: center; }
  .pcard .col-status { width: 55px; text-align: center; }
  .pcard .col-photos { width: 70px; text-align: center; color: var(--color-primary); font-weight: 600; }
  .pcard .col-action { width: 70px; text-align: center; margin-left: auto; }
  .pcard .col-action .btn { font-size: 11px; padding: 4px 10px; }
  .status-complete { color: #16a34a; font-weight: 600; }
  .status-progress { color: #d97706; font-weight: 600; }
  .filter-row {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
  }
  .filter-row select {
    font-size: 12px; padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border-strong); background: #fff; color: var(--text-primary);
  }
  .filter-row label { font-size: 11px; color: var(--text-muted); font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }
  .empty-state .ico { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state h3 { color: var(--text-primary); margin-bottom: 8px; }

  /* ===== 신규 등록 탭 ===== */
  .form-shell {
    max-width: 520px;
    margin: 0 auto;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 32px;
  }
  .form-shell .form-step {
    font-size: 11px;
    color: var(--color-primary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .form-shell h2 {
    font-size: 22px;
    margin-bottom: 16px;
  }
  .form-shell label {
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .form-shell .input, .form-shell .select {
    padding: 12px 14px;
    font-size: 14px;
  }
  .form-shell .submit-btn {
    width: 100%;
    padding: 14px 24px;
    font-size: 15px;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div id="app-shell"></div>
<main class="content">

<section class="ps-hero">
  <h1>환자 선택 또는 등록</h1>
  <p>저장된 환자를 선택하거나 새 환자를 등록하세요. 모든 진단은 선택된 환자에 종속됩니다.</p>
</section>

<div class="container">

<div class="ps-tabs" role="tablist">
  <button id="tabList" class="active" data-tab="list" role="tab">
    <span class="icon">📋</span>저장된 환자<span class="count" id="countList">0</span>
  </button>
  <button id="tabNew" data-tab="new" role="tab">
    <span class="icon">+</span>신규 환자 등록
  </button>
</div>

<div class="panel active" id="panelList">
  <div class="search-bar">
    <input class="input" id="searchInput" placeholder="🔍 이름으로 검색…">
    <button class="filter-btn" data-age-filter="" id="filterAll">전체</button>
    <button class="filter-btn" data-age-filter="adult" id="filterAdult">성인</button>
    <button class="filter-btn" data-age-filter="child" id="filterChild">어린이</button>
  </div>

  <div class="filter-row" id="advFilters">
    <label>클래스</label>
    <select id="filterClass"><option value="">전체</option><option value="class1">Class I</option><option value="class2">Class II</option><option value="class3">Class III</option></select>
    <label>성별</label>
    <select id="filterGender"><option value="">전체</option><option value="male">남</option><option value="female">여</option></select>
    <label>교정상태</label>
    <select id="filterStatus"><option value="">전체</option><option value="completed">완료</option><option value="in_progress">진행중</option></select>
  </div>

  <div id="patientGrid" class="patient-grid"></div>

  <div id="emptyList" class="empty-state" style="display:none;">
    <div class="ico">👥</div>
    <h3>저장된 환자가 없습니다</h3>
    <p>오른쪽 [+ 신규 환자 등록] 탭에서 첫 환자를 등록하세요.</p>
    <button class="btn btn-primary mt-4" onclick="switchTab('new')">+ 신규 환자 등록 →</button>
  </div>
</div>

<div class="panel" id="panelNew">
  <div class="form-shell">
    <div class="form-step">Step 1 of 1</div>
    <h2>새 환자 등록</h2>
    <p style="color:var(--text-muted); font-size:13px; margin-bottom:24px;">생년월일 입력 시 자동으로 만 나이와 연령 구분이 계산됩니다.</p>

    <div class="field">
      <label>이름 <span style="color:var(--color-danger);">*</span></label>
      <input class="input" id="psName" placeholder="홍길동" autocomplete="off">
    </div>

    <div class="grid grid-2" style="gap:14px;">
      <div class="field">
        <label>생년월일</label>
        <input class="input" type="date" id="psDob" max="2026-04-30">
        <div id="psAgeHint" style="font-size:11px; color:var(--text-muted); margin-top:4px; min-height:14px;"></div>
      </div>
      <div class="field">
        <label>연령 구분</label>
        <select class="select" id="psAgeGroup">
          <option value="">자동 (생년월일 기준)</option>
          <option value="child">어린이 (≤17세)</option>
          <option value="adult">성인</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>성별</label>
      <select class="select" id="psGender">
        <option value="">선택</option>
        <option value="male">남성</option>
        <option value="female">여성</option>
        <option value="other">기타</option>
      </select>
    </div>

    <button class="btn btn-primary submit-btn" id="psSubmit">+ 환자 등록 후 진단 시작</button>

    <p style="font-size:11px; color:var(--text-muted); margin-top:16px; text-align:center;">
      등록 시 환자 정보가 Supabase 클라우드에 영구 저장되며, 모든 진단은 이 환자와 연결됩니다.
    </p>
  </div>
</div>

</div>
</main>

<script src="js/api-config.js"></script>
<script src="js/common.js"></script>
<script>
let ALL_PATIENTS = [];
let CURRENT_FILTER = '';

const TYPE_KO = { extraction: '발치', growth: '성장', facial: '안모', recurrence: '재발' };

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function loadPatients() {
  const grid = document.getElementById('patientGrid');
  grid.innerHTML = '<div class="empty-state"><div class="ico">⏳</div><p>불러오는 중...</p></div>';
  try {
    let records = [];
    try {
      const res = await window.apiFetch('/api/get-patients');
      const data = await res.json();
      records = data.records || [];
      if (data.fallback) throw new Error('fallback');
    } catch (apiErr) {
      // API 서버 없으면 Supabase REST 직접 호출
      const SB_URL = 'https://htqdfuuzgrjrwvdgwhlc.supabase.co';
      const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cWRmdXV6Z3Jqcnd2ZGd3aGxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDQxMDMsImV4cCI6MjA5MzEyMDEwM30.UEpUrEy0Bf5uWOjT2VgP6avX8rQ0mHOcTjbw_D6zoaY';
      const res2 = await fetch(SB_URL + '/rest/v1/patients?select=id,name,age_group,gender,metadata,created_at&order=created_at.desc&limit=100', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      if (res2.ok) records = await res2.json();
    }
    ALL_PATIENTS = records;
    document.getElementById('countList').textContent = ALL_PATIENTS.length;
    if (!records.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
        <div class="ico">📋</div>
        <h3>등록된 환자가 없습니다</h3>
        <p>1단계 사진 입력에서 환자를 저장하거나, 신규 등록하세요.</p>
        <button class="btn btn-primary mt-4" onclick="switchTab('new')">신규 환자 등록 →</button>
      </div>`;
      return;
    }
    renderList();
  } catch (e) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="ico">⚠️</div><h3>불러오기 실패</h3><p>${escapeHtml(e.message)}</p></div>`;
  }
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = ALL_PATIENTS;
  if (q) filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(q));
  if (CURRENT_FILTER) filtered = filtered.filter(p => p.age_group === CURRENT_FILTER);

  document.getElementById('countList').textContent = filtered.length;
  const grid = document.getElementById('patientGrid');
  const empty = document.getElementById('emptyList');

  if (!filtered.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    if (q) empty.querySelector('p').textContent = `"${q}" 검색 결과 없음. 신규 등록하시겠습니까?`;
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  // 추가 필터 적용
  const fClass = document.getElementById('filterClass').value;
  const fGender = document.getElementById('filterGender').value;
  const fStatus = document.getElementById('filterStatus').value;
  if (fClass) filtered = filtered.filter(p => (p.metadata?.classification || '') === fClass);
  if (fGender) filtered = filtered.filter(p => (p.gender || '') === fGender);
  if (fStatus) filtered = filtered.filter(p => (p.metadata?.orthodonticStatus || '') === fStatus);

  document.getElementById('countList').textContent = filtered.length;

  const headerHtml = `<div class="pcard pcard-header">
    <span class="col-name">환자명</span>
    <span class="col-class">클래스</span>
    <span class="col-gender">성별</span>
    <span class="col-age">나이</span>
    <span class="col-start">교정시작일</span>
    <span class="col-end">교정완료일</span>
    <span class="col-extract">발치여부</span>
    <span class="col-status">상태</span>
    <span class="col-photos">사진</span>
    <span class="col-action">선택</span>
  </div>`;

  grid.innerHTML = headerHtml + filtered.map(p => {
    const meta = p.metadata || {};
    const status = meta.orthodonticStatus === 'completed' ? '완료' : meta.orthodonticStatus === 'in_progress' ? '진행중' : '—';
    const statusClass = status === '완료' ? 'status-complete' : status === '진행중' ? 'status-progress' : '';
    const cls = meta.classification ? meta.classification.replace('class', 'Class ') : '—';
    const gender = p.gender === 'male' ? '남' : p.gender === 'female' ? '여' : '—';
    const age = meta.age || '—';
    const startDate = meta.startDate || '—';
    const endDate = meta.endDate || (status === '완료' ? '완료' : '—');
    const photoCount = (meta.initial?.intraoral || 0) + (meta.final?.intraoral || 0);
    return `
      <div class="pcard" data-pid="${escapeHtml(p.id)}">
        <span class="col-name">${escapeHtml(p.name)}</span>
        <span class="col-class">${cls}</span>
        <span class="col-gender">${gender}</span>
        <span class="col-age">${age}</span>
        <span class="col-start">${startDate}</span>
        <span class="col-end">${endDate}</span>
        <span class="col-extract">${meta.extraction || '—'}</span>
        <span class="col-status ${statusClass}">${status}</span>
        <span class="col-photos">${photoCount}장</span>
        <span class="col-action"><button class="btn btn-primary btn-sm" data-action="select">✓ 선택</button></span>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.pcard').forEach(card => {
    const pid = card.dataset.pid;
    card.querySelectorAll('[data-action="select"]').forEach(b => b.onclick = (e) => { e.stopPropagation(); selectPatient(pid, false); });
    card.querySelectorAll('[data-action="history"]').forEach(b => b.onclick = (e) => { e.stopPropagation(); selectPatient(pid, true); });
    card.onclick = () => selectPatient(pid, false);
  });
}

function selectPatient(pid, goHistory) {
  const p = ALL_PATIENTS.find(r => r.id === pid);
  if (!p) return;
  window.PatientStore.set({
    id: p.id, supabaseId: p.id,
    name: p.name, dob: p.dob,
    ageGroup: p.age_group, gender: p.gender, age: p.age,
    metadata: p.metadata
  });
  window.toast(`${p.name} 환자를 선택했습니다.`, 'success');
  setTimeout(() => window.location.href = `patient-view.html?id=${encodeURIComponent(p.id)}`, 500);
}

function switchTab(tabName) {
  document.querySelectorAll('.ps-tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tabName));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel' + tabName.charAt(0).toUpperCase() + tabName.slice(1)));
  if (tabName === 'list') loadPatients();
}

// 신규 등록 폼
document.getElementById('psDob').addEventListener('change', e => {
  const dob = e.target.value;
  const hint = document.getElementById('psAgeHint');
  if (dob) {
    const age = Math.floor((Date.now() - new Date(dob).getTime()) / (365.25 * 24 * 60 * 60 * 1000));
    const grp = age <= 17 ? '어린이' : '성인';
    hint.innerHTML = `→ 만 <strong style="color:var(--color-primary);">${age}세</strong> · ${grp}`;
  } else {
    hint.innerHTML = '';
  }
});

document.getElementById('psSubmit').addEventListener('click', async () => {
  const name = document.getElementById('psName').value.trim();
  const dob = document.getElementById('psDob').value;
  let ageGroup = document.getElementById('psAgeGroup').value;
  const gender = document.getElementById('psGender').value;
  if (!name) { window.toast('이름을 입력하세요.', 'warning'); return; }
  let age = null;
  if (dob) {
    age = Math.floor((Date.now() - new Date(dob).getTime()) / (365.25 * 24 * 60 * 60 * 1000));
    if (!ageGroup) ageGroup = age <= 17 ? 'child' : 'adult';
  }
  const btn = document.getElementById('psSubmit');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const res = await window.apiFetch('/api/register-patient', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, dob, ageGroup, gender, age })
    });
    const json = await res.json();
    if (json.success && json.patient) {
      window.PatientStore.set({
        id: json.patient.id, supabaseId: json.patient.id,
        name, dob, ageGroup, gender, age
      });
      if (json.duplicate) {
        window.toast(`이미 등록된 환자입니다 — ${name}. 기존 환자로 진단 시작합니다.`, 'info');
      } else {
        window.toast(`✅ ${name} 환자 등록 완료. 진단 페이지로 이동합니다.`, 'success');
      }
      setTimeout(() => window.location.href = 'extraction-ai.html', 800);
    } else {
      window.toast('등록 실패: ' + (json.message || '알 수 없는 오류'), 'error');
      btn.disabled = false;
      btn.textContent = '+ 환자 등록 후 진단 시작';
    }
  } catch (e) {
    window.toast('네트워크 오류: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '+ 환자 등록 후 진단 시작';
  }
});

// Tab events
document.querySelectorAll('.ps-tabs button').forEach(b => b.onclick = () => switchTab(b.dataset.tab));

// Search & filter
document.getElementById('searchInput').oninput = renderList;
document.getElementById('filterClass').onchange = renderList;
document.getElementById('filterGender').onchange = renderList;
document.getElementById('filterStatus').onchange = renderList;
document.querySelectorAll('[data-age-filter]').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('[data-age-filter]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    CURRENT_FILTER = b.dataset.ageFilter;
    renderList();
  };
});
document.getElementById('filterAll').classList.add('active');

// URL hash로 신규 탭 직행 가능 (?tab=new)
const params = new URLSearchParams(location.search);
if (params.get('tab') === 'new') switchTab('new');

loadPatients();
</script>
</body>
</html>
